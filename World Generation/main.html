<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Generation</title>
    <script type="importmap">
        {
            "imports": {
            "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/",
            "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            min-width: 240px;
        }
        #controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            border-bottom: 1px solid #555;
            padding-bottom: 6px;
        }
        #controls button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            margin: 4px 4px 4px 0;
        }
        #scene-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #controls button:hover { background: #666; }
        #controls button.active { background: #2a7a2a; border-color: #4a4; }
        #gui-container { margin-top: 10px; }
    </style>
</head>
<body>

<div id="scene-container"></div>

<!-- ===================== UI Controls ===================== -->
<div id="controls">
    <h3>World Generation</h3>
    <div>
        Owen Kabrhel and Thai Hinh Nguyen<br><br>
        <button id="btnToggleSun">Start Sun</button>
        <button id="btnReset">Reset</button><br>
        <div id="gui-container"></div>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from "https://unpkg.com/three@0.169.0/examples/jsm/controls/OrbitControls.js?module";
    import GUI from 'lil-gui';

    // ─── Scene Variables ───────────────────────────────────────────────
    let container, scene, camera, renderer, controls;
    let sunMesh;
    let hemiLight;
    let gui;

    // Animation state
    let sunAngle = 0;
    let isSunAnimating = false;
    let sunSpeed = 0.005;
    const sunRadius = 15;  // Orbit radius of the sun

    // ─── Initialization ────────────────────────────────────────────────
    function init() {
        container = document.getElementById('scene-container');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // sky blue

        // Create scene objects
        createRenderer();
        createCamera();
        createLights();
        createGround();
        createSun();

        // GUI
        setupGUI();

        // Button Wiring
        setupButtons();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start render loop
        animate();
    }

    // ─── Renderer ──────────────────────────────────────────────────────
    function createRenderer() {
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.outputColorSpace = THREE.SRGBColorSpace;  // correct color display
        container.appendChild(renderer.domElement);
    }

    // ─── Camera + Controls ─────────────────────────────────────────────
    function createCamera() {
        const aspect = container.clientWidth / container.clientHeight;
        camera = new THREE.PerspectiveCamera(50, aspect, 0.1, 200);
        camera.position.set(12, 15, 20);

        // Orbit controls
        controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 5, 0);
        controls.enableDamping = true;
    }

    // ─── Lights ────────────────────────────────────────────────────────
    function createLights() {
        // Hemisphere light: bright sky + green ground bounce — makes colors vivid
        hemiLight = new THREE.HemisphereLight(0xffffff, 0x446644, 0.5);
        scene.add(hemiLight);
    }

    let groundShaderMaterial;
    // ─── Ground ───────────────────────────────────────────────────────
    function createGround() {
        const groundGeometry = new THREE.BoxGeometry( 20, 20, 5, 100, 100, 20 );

        groundShaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                u_resolution:     { value: new THREE.Vector2(1000, 1000) },
                u_time:        { value: 1.0 },
                u_heightNoiseScale: { value: 1.0 },
                u_colorNoiseScale: { value: 2.0 },
                u_biomeNoiseScale: { value: 0.5 },
                u_generalAmplitude: { value: 1.0 },
                u_noisePosition: { value: 0 },
                u_colorA: { value: new THREE.Vector3(0.2, 0.878, 0.02)},
                u_colorB: { value: new THREE.Vector3(0.275, 0.639, 0.165)},
                u_lightPos: { value: new THREE.Vector3() },
                u_cameraPos: { value: new THREE.Vector3() },
                u_lightColor: { value: new THREE.Color(0xffffff) },
                u_ambientStrength: { value: 1.0 },
                u_diffuseStrength: { value: 1.5 },
                u_specularStrength: { value: 0.5 },
                u_shininess: { value: 16.0 },
                uBiomes: { value: biomes }
            },
            vertexShader: groundVertexShader,
            fragmentShader: groundFragmentShader,
        });

        const ground = new THREE.Mesh(groundGeometry, groundShaderMaterial);

        groundGeometry.rotateX(-Math.PI / 2);

        normalizeBiomeFrequencies();

        scene.add(ground);

        // Cover for the sides of the box
        const dirtGeometry = new THREE.BoxGeometry(20.1, 2.0, 20.1);
        const dirtMaterial = new THREE.MeshPhongMaterial({ color: 0xA65A2A });

        const dirt = new THREE.Mesh(dirtGeometry, dirtMaterial);
        dirt.position.y = 1.4;

        ground.add(dirt);

        const stoneGeometry = new THREE.BoxGeometry(20.1, 3.0, 20.1);
        const stoneMaterial = new THREE.MeshPhongMaterial({ color: 0x9A9A9A });

        const stone = new THREE.Mesh(stoneGeometry, stoneMaterial);
        stone.position.y = -1.1;

        ground.add(stone);
    }

    // ─── Biomes ───────────────────────────────────────────────────────
    const biomes = [
        { colorA: new THREE.Color(0x68a346), colorB: new THREE.Color(0x66b03c), heightAmplitude: 1, heightScale: 0.1, colorScale: 1, frequency: 0.0 }, // forest
        { colorA: new THREE.Color(0x4584cc), colorB: new THREE.Color(0x2567b3), heightAmplitude: 1, heightScale: 0.0, colorScale: 1, frequency: 0.0 }, // lake
        { colorA: new THREE.Color(0x5ebd17), colorB: new THREE.Color(0x71d426), heightAmplitude: 1, heightScale: 0.01, colorScale: 1, frequency: 0.0 }, // plains
        { colorA: new THREE.Color(0x4cb5b5), colorB: new THREE.Color(0x4e9c9c), heightAmplitude: 2, heightScale: 0.1, colorScale: 1, frequency: 0.0 }, // highlands
        { colorA: new THREE.Color(0xace8f2), colorB: new THREE.Color(0xbfdbe0), heightAmplitude: 6, heightScale: 0.1, colorScale: 1, frequency: 0.0 }, // mountain peaks
    ];

    // Temporary biome frequencies stored before normalization calculations
    const biomeFrequencies = [
        { value: 1.0 }, // forest
        { value: 1.0 }, // lake
        { value: 1.0 }, // plains
        { value: 1.0 }, // highlands
        { value: 1.0 }, // mountain peaks
    ];

    // Normalize biome frequencies so they sum to 1 before applying to main biomes array
    // Connecting the buttons directly to the biomes array makes things go real weird so don't do it
    function normalizeBiomeFrequencies() {
        const total = biomeFrequencies.reduce((sum, biome) => sum + biome.value, 0);
        biomes.forEach((biome, index) => {
            biome.frequency = biomeFrequencies[index].value / total;
        });
        groundShaderMaterial.uniforms.uBiomes.needsUpdate = true;
    }

    // ─── Sun ──────────────────────────────────────────────────────────
    function createSun() {
        const geometry = new THREE.SphereGeometry(1, 32, 32);
        const material = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        sunMesh = new THREE.Mesh(geometry, material);
        scene.add(sunMesh);

        const sunLight = new THREE.PointLight(0xffffff, 500, 0);
        sunMesh.add(sunLight);
    }

    // ─── Shaders ──────────────────────────────────────────────────────

    // Helper functions
    // language=Glsl
    const voronoiImplementation = `
        vec2 random2( vec2 p ) {
            return fract(sin(vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3))))*43758.5453);
        }

        float voronoi(vec2 coords, float u_time) {
            vec2 st = coords;
            vec3 color = vec3(.0);

            // Tile the space
            vec2 i_st = floor(st);
            vec2 f_st = fract(st);

            float m_dist = 10.;  // minimum distance
            vec2 m_point;        // minimum point

            for (int j=-1; j<=1; j++ ) {
                for (int i=-1; i<=1; i++ ) {
                    vec2 neighbor = vec2(float(i),float(j));
                    vec2 point = random2(i_st + neighbor);
                    point = 0.5 + 0.5*sin(u_time + 6.2831*point);
                    vec2 diff = neighbor + point - f_st;
                    float dist = length(diff);

                    if( dist < m_dist ) {
                        m_dist = dist;
                        m_point = point;
                    }
                }
            }

            // Assign a color using the closest point position
            //float value = dot(m_point,vec2(.3,.6));

            // 0 to 1 value
            return fract(dot(m_point, vec2(.3, .6)));
        }
    `

    // language=Glsl
    const noiseImplementation = `
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

        // Description : GLSL 2D simplex noise function
        //      Author : Ian McEwan, Ashima Arts
        //  Maintainer : ijm
        //     Lastmod : 20110822 (ijm)
        //     License :
        //  Copyright (C) 2011 Ashima Arts. All rights reserved.
        //  Distributed under the MIT License.
        float snoise(vec2 v) {
            // Precompute values for skewed triangular grid
            const vec4 C = vec4(0.211324865405187,
            // (3.0-sqrt(3.0))/6.0
            0.366025403784439,
            // 0.5*(sqrt(3.0)-1.0)
            -0.577350269189626,
            // -1.0 + 2.0 * C.x
            0.024390243902439);
            // 1.0 / 41.0

            // First corner (x0)
            vec2 i  = floor(v + dot(v, C.yy));
            vec2 x0 = v - i + dot(i, C.xx);

            // Other two corners (x1, x2)
            vec2 i1 = vec2(0.0);
            i1 = (x0.x > x0.y)? vec2(1.0, 0.0):vec2(0.0, 1.0);
            vec2 x1 = x0.xy + C.xx - i1;
            vec2 x2 = x0.xy + C.zz;

            i = mod289(i);
            vec3 p = permute(
                permute( i.y + vec3(0.0, i1.y, 1.0))
                + i.x + vec3(0.0, i1.x, 1.0 ));

            vec3 m = max(0.5 - vec3(
            dot(x0,x0),
            dot(x1,x1),
            dot(x2,x2)
            ), 0.0);

            m = m*m;
            m = m*m;

            vec3 x = 2.0 * fract(p * C.www) - 1.0;
            vec3 h = abs(x) - 0.5;
            vec3 ox = floor(x + 0.5);
            vec3 a0 = x - ox;

            // Normalise gradients implicitly by scaling m
            // Approximation of: m *= inversesqrt(a0*a0 + h*h);
            m *= 1.79284291400159 - 0.85373472095314 * (a0*a0+h*h);

            // Compute final noise value at P
            vec3 g = vec3(0.0);
            g.x  = a0.x  * x0.x  + h.x  * x0.y;
            g.yz = a0.yz * vec2(x1.x,x2.x) + h.yz * vec2(x1.y,x2.y);
            return 130.0 * dot(m, g);
        }
    `

    // Main Shaders

    // Vertex shader

    // language=Glsl
    const groundVertexShader = `
        /* glsl */
        struct Biome {
            vec3 colorA;
            vec3 colorB;
            float colorScale;
            float heightAmplitude;
            float heightScale;
            float frequency;
        };

        uniform Biome uBiomes[5];

        varying vec3 vNormal;
        varying vec3 vWorldPosition;

        // ===========  NOISE  =============
        uniform vec2 u_resolution;
        uniform float u_colorNoiseScale;
        uniform float u_heightNoiseScale;
        uniform float u_biomeNoiseScale;
        uniform float u_generalAmplitude;
        uniform float u_time;

        ${noiseImplementation}
        ${voronoiImplementation}

        void main() {
            float valueFromVoronoi = voronoi(position.xz * u_biomeNoiseScale, u_time);

            // New biome selection calculations go through the list of biomes and checks the current noise frequency to assign biomes
            // Checks if the current noise value is less than the biome frequency
            // Assigns biomeIndex to the current biome if it detects the correct biome
            // Uses cumulative to go through the list of frequencies to check specific ranges
            // Example: Forest = 0.1, Lake 0.2, Plains 0.3
            // Current noise = 0.35
            // 0.35 > 0.1, go to next biome
            // Cumulative = 0 + 0.1
            // 0.35 > 0.2 + 0.1, go to next biome
            // Cumulative = 0.1 + 0.2
            // 0.35 < 0.3 + 0.3, biomeIndex = 2 
            // Can also be viewed as: (0, 0.1) = Forest, (0.1, 0.3) = Lake, (0.3, 0.6) = Plains
            float cumulative = 0.0;
            int biomeIndex = 0;
            for (int i = 0; i < 5; i++) {
                if (valueFromVoronoi < uBiomes[i].frequency + cumulative) {
                    biomeIndex = i;
                    break;
                }
                cumulative += uBiomes[i].frequency;
            }

            Biome thisBiome = uBiomes[biomeIndex];

            float heightNoise = snoise(position.xz * thisBiome.heightScale * u_heightNoiseScale);
            heightNoise *= thisBiome.heightAmplitude;
            heightNoise *= u_generalAmplitude;
            if (heightNoise < 0.0) {
                heightNoise = 0.0;
            }

            vec3 newPosition = position;
            newPosition.y += heightNoise * 1.0;

            vNormal = normalize(mat3(modelMatrix) * normal);

            vec4 worldPosition = modelMatrix * vec4(newPosition, 1.0);
            vWorldPosition = worldPosition.xyz;

            vec4 viewPos = modelViewMatrix * vec4(newPosition, 1.0);
            gl_Position = projectionMatrix * viewPos;
        }
      `;

    // Fragment shader
    
    // language=Glsl
    const groundFragmentShader = `
        /* glsl */
        // ===========  Biomes  =============

        struct Biome {
            vec3 colorA;
            vec3 colorB;
            float colorScale;
            float heightAmplitude;
            float heightScale;
            float frequency;
        };

        uniform Biome uBiomes[5];

        varying vec3 vWorldPosition;

        // ===========  VORONOI  =============

        uniform vec2 u_resolution;
        uniform float u_colorNoiseScale;
        uniform float u_heightNoiseScale;
        uniform float u_biomeNoiseScale;
        uniform float u_generalAmplitude;
        uniform float u_time;

        uniform vec3 u_colorA;
        uniform vec3 u_colorB;

        ${voronoiImplementation}

        // ===========  Shader Implementation  =============

        uniform vec3 u_lightPos;
        uniform vec3 u_cameraPos;
        uniform vec3 u_lightColor;
        uniform float u_ambientStrength;
        uniform float u_diffuseStrength;
        uniform float u_specularStrength;
        uniform float u_shininess;

        varying vec3 vNormal;

        void main() {
            vec3 normal = normalize(vNormal);

            // --- Ambient ---
            vec3 ambient = u_ambientStrength * u_lightColor;

            // --- Diffuse ---
            vec3 lightDir = normalize(u_lightPos - vWorldPosition);
            float diff = max(dot(normal, lightDir), 0.0);
            vec3 diffuse = diff * u_diffuseStrength * u_lightColor;

            // --- Specular (Blinn-Phong) ---
            vec3 viewDir = normalize(u_cameraPos - vWorldPosition);
            vec3 halfDir = normalize(lightDir + viewDir);
            float spec = pow(max(dot(normal, halfDir), 0.0), u_shininess);
            vec3 specular = spec * u_specularStrength * u_lightColor;

            float valueFromVoronoi = voronoi(vWorldPosition.xz * u_biomeNoiseScale, u_time);

            float cumulative = 0.0;
            int biomeIndex = 0;
            for (int i = 0; i < 5; i++) {
                cumulative += uBiomes[i].frequency;
                if (valueFromVoronoi < cumulative) {
                    biomeIndex = i;
                    break;
                }
            }

            Biome thisBiome = uBiomes[biomeIndex];

            float value = voronoi(vWorldPosition.xz * thisBiome.colorScale * u_colorNoiseScale, u_time);
            vec3 color = mix(thisBiome.colorA, thisBiome.colorB, value);

            vec3 result = (ambient + diffuse + specular) * color;
            gl_FragColor = vec4(result, 1.0);
        }
    `;

    // ─── GUI Setup ────────────────────────────────────────────────────
    function setupGUI() {
        gui = new GUI({ container: document.getElementById('gui-container') });
        
        // Sun controls
        const sunFolder = gui.addFolder('Sun Animation');
        sunFolder.add({ speed: sunSpeed }, 'speed', 0.001, 0.02, 0.001)
            .name('Rotation Speed')
            .onChange(value => sunSpeed = value);
        sunFolder.open();

        // Noise controls
        const noiseFolder = gui.addFolder('Noise Controls');
        noiseFolder.add(groundShaderMaterial.uniforms.u_biomeNoiseScale, 'value', 0.0, 2.0, 0.05)
            .name('Biome Noise Scale');
        noiseFolder.add(groundShaderMaterial.uniforms.u_colorNoiseScale, 'value', 0.0, 4.0, 0.05)
            .name('Color Noise Scale');
        noiseFolder.add(groundShaderMaterial.uniforms.u_heightNoiseScale, 'value', 0.0, 3.0, 0.05)
            .name('Height Noise Scale');
        noiseFolder.add(groundShaderMaterial.uniforms.u_generalAmplitude, 'value', 0.0, 2.0, 0.05)
            .name('Terrain Amplitude');
        noiseFolder.open();

        // Biome controls
        const biomeFolder = gui.addFolder('Biome Controls');
        biomeFolder.add(biomeFrequencies[0], 'value', 0.0, 1.0, 0.05)
            .name('Forest Frequency')
            .onChange(value => {
                normalizeBiomeFrequencies();
            });
        biomeFolder.add(biomeFrequencies[1], 'value', 0.0, 1.0, 0.05)
            .name('Lake Frequency')
            .onChange(value => {
                normalizeBiomeFrequencies();
            });
        biomeFolder.add(biomeFrequencies[2], 'value', 0.0, 1.0, 0.05)
            .name('Plains Frequency')
            .onChange(value => {
                normalizeBiomeFrequencies();
            });
        biomeFolder.add(biomeFrequencies[3], 'value', 0.0, 1.0, 0.05)
            .name('Highlands Frequency')
            .onChange(value => {
                normalizeBiomeFrequencies();
            });
        biomeFolder.add(biomeFrequencies[4], 'value', 0.0, 1.0, 0.05)
            .name('Mountain Frequency')
            .onChange(value => {
                normalizeBiomeFrequencies();
            });
        biomeFolder.open();

        // Water controls?
    }

    // ─── Button Wiring ────────────────────────────────────────────────────

    function setupButtons() {
        const btnSun = document.getElementById('btnToggleSun');
        btnSun.addEventListener('click', () => {
            isSunAnimating = !isSunAnimating;
            btnSun.textContent = isSunAnimating ? 'Stop Sun' : 'Start Sun';
            btnSun.classList.toggle('active', isSunAnimating);
        });

        const btnReset = document.getElementById('btnReset');
        btnReset.addEventListener('click', () => {
            // Reset sun animation
            isSunAnimating = false;
            sunAngle = 0;
            btnSun.textContent = 'Start Sun';
            btnSun.classList.remove('active');
            sunSpeed = 0.005;

            // Reset ground controls
            groundShaderMaterial.uniforms.u_biomeNoiseScale.value = 0.5;
            groundShaderMaterial.uniforms.u_colorNoiseScale.value = 2.0;
            groundShaderMaterial.uniforms.u_heightNoiseScale.value = 1.0;
            groundShaderMaterial.uniforms.u_generalAmplitude.value = 1.0;

            // Reset biome controls
            biomeFrequencies.forEach(biome => biome.value = 1.0);
            normalizeBiomeFrequencies();

            // Recreate GUI to reset sliders on buttons
            gui.destroy();
            setupGUI();
        });
    }

    // ─── Animation Loop ────────────────────────────────────────────────────
    function animate() {
        requestAnimationFrame(animate);

        // Animations here

        // Sun animation
        if (isSunAnimating){
            sunAngle += sunSpeed;
        }

        const sunX = sunRadius * -Math.cos(sunAngle);
        const sunZ = sunRadius * -Math.sin(sunAngle);
        const sunY = 5 + 10 * Math.sin(sunAngle);
        const sunWorldPos = new THREE.Vector3(sunX, sunY, sunZ);
        const sunViewPos = sunWorldPos.clone().applyMatrix4(camera.matrixWorldInverse)

        sunMesh.position.set(sunX, sunY, sunZ);

        groundShaderMaterial.uniforms.u_ambientStrength.value = 0.5 + 0.1 * Math.sin(sunAngle);
        hemiLight.intensity = 0.8 + 0.6 * Math.sin(sunAngle);

        // Copy
        groundShaderMaterial.uniforms.u_lightPos.value.copy(sunMesh.position);
        groundShaderMaterial.uniforms.u_cameraPos.value.copy(camera.position);

        // Update functions, keep at the end
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
